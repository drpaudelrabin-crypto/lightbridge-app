<!DOCTYPE html>
<html>
<head>
  <title>LightBridge Health Screening</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; text-align:center;}
    h1 { color:#222; }

    .card {
      background:white;
      padding:20px;
      margin:15px auto;
      border-radius:12px;
      max-width:360px;
      box-shadow:0 2px 6px rgba(0,0,0,0.05);
    }

    input {
      display:block;
      margin:8px auto;
      padding:10px;
      width:85%;
    }

    button {
      padding:12px 20px;
      background:gold;
      border:none;
      border-radius:8px;
      margin-top:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .good { color:green; }
    .warn { color:orange; }
    .bad { color:red; }
  </style>
</head>

<body>

<h1>✨ LightBridge Health</h1>
<p>Free Health Screening</p>

<div class="card">
  <h2>Start Here</h2>

  <input id="name" placeholder="Your Name">
  <input id="contact" placeholder="Phone or Email">

  <input id="weight" placeholder="Weight (kg)">
  <input id="height" placeholder="Height (cm)">

  <button onclick="analyze()">Check My Health</button>

  <h3 id="result"></h3>
  <p id="message"></p>
</div>

<div class="card">
  <h2>Join Our Care Program</h2>

  <p>✔ Same-day access</p>
  <p>✔ Preventive care focus</p>
  <p>✔ Personalized doctor time</p>

  <button onclick="join()">Join Waitlist</button>
</div>

<script>

function analyze(){

  let name = document.getElementById("name").value;
  let contact = document.getElementById("contact").value;
  let weight = Number(document.getElementById("weight").value);
  let height = Number(document.getElementById("height").value);

  if(!name || !contact || !weight || !height){
    alert("Fill all fields");
    return;
  }

  let bmi = (weight / ((height/100)*(height/100))).toFixed(1);

  let msg = "";
  let color = "green";

  if(bmi < 18.5){
    msg = "Underweight – needs attention";
    color = "warn";
  }
  else if(bmi < 25){
    msg = "Normal – healthy range";
    color = "good";
  }
  else if(bmi < 30){
    msg = "Overweight – early risk";
    color = "warn";
  }
  else{
    msg = "High Risk – medical follow-up advised";
    color = "bad";
  }

  document.getElementById("result").innerHTML = "BMI: " + bmi;
  document.getElementById("message").innerHTML =
    `<span class="${color}">${msg}</span>`;

  // Save lead automatically
  let lead = {
    name,
    contact,
    bmi,
    date: new Date().toLocaleString()
  };

  localStorage.setItem("lead_" + Date.now(), JSON.stringify(lead));
}

function join(){
  alert("You're on the waitlist! We'll contact you soon.");
}

</script>

</body>
</html>
