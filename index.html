<!DOCTYPE html>
<html>
<head>
  <title>LightBridge Health</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    h1 { color:#222; }
    .card { background:white; padding:20px; margin:15px 0; border-radius:12px; }
    input { display:block; margin:6px 0; padding:8px; width:220px; }
    button { padding:10px 20px; background:gold; border:none; border-radius:8px; margin:5px; cursor:pointer; }
    .good { color:green; }
    .warn { color:orange; }
    .bad { color:red; }
  </style>
</head>

<body>

<h1>✨ LightBridge Health Dashboard</h1>

<div class="card">
<h2>Patient</h2>
<input id="name" placeholder="Patient Name">
</div>

<div class="card">
<h2>Labs</h2>
<input id="glucose" placeholder="Glucose">
<input id="insulin" placeholder="Insulin">
<input id="hba1c" placeholder="HbA1c">
<input id="ldl" placeholder="LDL">
<input id="hdl" placeholder="HDL">
<input id="trig" placeholder="Triglycerides">
<input id="crp" placeholder="hsCRP">
</div>

<div class="card">
<h2>Body Composition</h2>
<input id="fat" placeholder="Body Fat %">
<input id="visceral" placeholder="Visceral Fat">
<input id="muscle" placeholder="Muscle Mass">
</div>

<button onclick="calculate()">Analyze</button>
<button onclick="savePatient()">Save Patient</button>
<button onclick="loadPatient()">Load Patient</button>
<button onclick="window.print()">Download PDF</button>

<div class="card">
<h2>Results</h2>
<p id="homa"></p>
<p id="ratio"></p>
<p id="score"></p>

<canvas id="chart"></canvas>

<h3>Insights</h3>
<div id="insights"></div>
</div>

<script>
let chart;

function val(id){ return Number(document.getElementById(id).value || 0); }

function calculate(){

  let glucose = val("glucose");
  let insulin = val("insulin");
  let hba1c = val("hba1c");
  let ldl = val("ldl");
  let hdl = val("hdl");
  let trig = val("trig");
  let crp = val("crp");

  let fat = val("fat");
  let visceral = val("visceral");

  let homa = (glucose && insulin) ? (glucose*insulin/405).toFixed(2) : "-";
  let ratio = (trig && hdl) ? (trig/hdl).toFixed(2) : "-";

  let score = 100;

  if(homa > 2) score -= 20;
  if(fat > 30) score -= 15;
  if(visceral > 10) score -= 20;
  if(ratio > 3) score -= 10;
  if(crp > 3) score -= 10;
  if(hba1c > 5.6) score -= 10;
  if(ldl > 130) score -= 10;

  let message = "";
  let color = "green";

  if(score >= 85){
    message = "🟢 Excellent Health Profile";
  } else if(score >= 70){
    message = "🟡 Early Risk – Preventive care recommended";
    color = "orange";
  } else {
    message = "🔴 High Risk – Needs medical attention";
    color = "red";
  }

  document.getElementById("homa").innerHTML = "HOMA-IR: " + homa;
  document.getElementById("ratio").innerHTML = "TG/HDL: " + ratio;
  document.getElementById("score").innerHTML =
    `<span style="color:${color}; font-size:22px;">
      Health Score: ${score}/100 <br>${message}
    </span>`;

  let insights = [];

  if(homa > 2) insights.push("⚠️ Insulin resistance");
  if(fat > 30) insights.push("⚠️ High body fat");
  if(visceral > 10) insights.push("🔴 Visceral fat risk");
  if(ratio > 3) insights.push("⚠️ Cardiometabolic risk");
  if(crp > 3) insights.push("🔴 Inflammation");

  if(insights.length === 0) insights.push("🟢 Stable");

  let summary = score >= 85 ? "Healthy profile"
              : score >= 70 ? "Early imbalance"
              : "Needs medical attention";

  document.getElementById("insights").innerHTML =
    insights.map(i=>"<p>"+i+"</p>").join("") +
    `<hr><p><b>Summary:</b> ${summary}</p>`;

  drawChart(score);
}

function drawChart(score){
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'doughnut',
    data: {
      labels: ["Health","Risk"],
      datasets: [{
        data: [score, 100-score],
        backgroundColor: ["green","lightgray"]
      }]
    }
  });
}

function savePatient(){
  let name = document.getElementById("name").value;
  let data = {
    glucose: val("glucose"),
    insulin: val("insulin")
  };

  localStorage.setItem(name, JSON.stringify(data));
  alert("Saved!");
}

function loadPatient(){
  let name = prompt("Enter name");
  let data = localStorage.getItem(name);

  if(data){
    data = JSON.parse(data);
    document.getElementById("glucose").value = data.glucose;
    document.getElementById("insulin").value = data.insulin;
    alert("Loaded!");
  } else {
    alert("No data found");
  }
}
</script>

</body>
</html>
